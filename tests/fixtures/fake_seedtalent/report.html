<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Completion Report</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page-kind="report_table">
    <header>
      <p>Visible Report</p>
      <h1>Course Completion Report</h1>
      <nav>
        <a href="lesson-list.html">Lesson List</a>
        <a href="completion.html">Completion Page</a>
      </nav>
    </header>
    <main>
      <section class="report-card">
        <p>Visible export controls are present for future report-capture tests.</p>
        <button type="button">Export CSV</button>
        <table>
          <thead>
            <tr>
              <th>Learner</th>
              <th>Status</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Person A</td>
              <td>Completed</td>
              <td>100%</td>
            </tr>
            <tr>
              <td>Person B</td>
              <td>In Progress</td>
              <td>--</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
